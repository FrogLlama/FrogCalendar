<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 PWA 핵심: 화면 줌 금지, 전체화면 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frog Calendar</title>
    <!-- 매니페스트: 이 1줄이 브라우저에서 '홈 화면에 앱으로 추가' 기능을 가능하게 합니다 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2b2b2b">
    
    <!-- iOS 사파리 전용 앱(PWA) 지원 태그 모음 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Frog Calendar">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
    <!-- 1. 첫 접속 화면: 구글 로그인 (서버 0원 구조의 핵심) -->
    <div id="login-screen" class="screen flex-center">
        <div class="card">
            <img src="icon-192.png" alt="Frog Calendar Logo" style="width: 120px; height: 120px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.6);">
            <h1 style="font-size:24px; color:#aadb44; margin-bottom:8px; font-weight:800; letter-spacing:-1px;">Frog Calendar</h1>
            <p style="color:#bbb; margin-bottom:15px;">나만의 세상에 단 하나뿐인 강력한 동기화 일기장</p>
            <!-- Google API 인증 버튼 -->
            <button id="btn-login" class="btn primary">구글 드라이브 연결 및 로그인</button>
            <button id="btn-install-app" style="display:none; margin-top:10px; background:#4CAF50; color:white; border:none; padding:10px; border-radius:4px; font-weight:bold; cursor:pointer; width:100%; box-sizing:border-box;">📱 홈 바탕화면에 진짜 앱처럼 설치하기</button>
            <p style="margin-top:20px; font-size:11px; color:#888;">웹과 폰에서는 읽으실 데이터에만 안전하게 접근합니다.</p>
        </div>
    </div>

    <!-- 2. 달력 조회 화면 -->
    <div id="main-screen" class="screen hidden">
        <header class="app-header">
            <div class="user-info">
                <span id="txt-status">☁️ 동기화 중...</span>
                <button id="btn-toggle-log" style="background:none;border:1px solid #555;color:#aaa;border-radius:4px;font-size:10px;margin-left:10px;padding:2px 6px;cursor:pointer;">로그 끄기/켜기</button>
            </div>
            <!-- PC와 동일한 탭 리스트 및 로그아웃 -->
            <div style="display:flex; align-items:center; gap:8px;">
                <select id="sel-tabs" class="tab-select"></select>
                <button id="btn-logout" style="background:none; border:none; color:#e74c3c; font-size:11px; font-weight:bold; cursor:pointer;" title="기기의 흔적을 지우고 로그아웃">로그아웃</button>
            </div>
        </header>

        <div class="month-controls">
            <button id="btn-prev" class="btn-icon">◀</button>
            <h2 id="txt-month-year">2026.03</h2>
            <button id="btn-next" class="btn-icon">▶</button>
        </div>

        <!-- 달력 격자무늬 표시란 -->
        <div id="calendar-grid" class="calendar-grid">
            <!-- JavaScript가 요일과 날짜 칸을 채워넣습니다 -->
        </div>
    </div>

    <!-- 3. 메모 추가/수정용 모바일 팝업 (취소선 기능 포함) -->
    <div id="modal-note" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="txt-modal-date">2026-03-30</h3>
                <button id="btn-close-modal" class="btn-close">✕</button>
            </header>
            <textarea id="txt-editor" placeholder="여기에 일정을 입력하세요..."></textarea>
            
            <div class="modal-controls">
                <!-- 색상 선택 (PC앱의 [C:#...] 포맷 호환) -->
                <div class="color-picker" id="color-picker-group">
                    <label><input type="radio" name="color" value="" checked> <span style="background:#555"></span></label>
                    <label><input type="radio" name="color" value="#D32F2F"> <span style="background:#D32F2F"></span></label>
                    <label><input type="radio" name="color" value="#388E3C"> <span style="background:#388E3C"></span></label>
                    <label><input type="radio" name="color" value="#1976D2"> <span style="background:#1976D2"></span></label>
                    <label><input type="radio" name="color" value="#FBC02D"> <span style="background:#FBC02D"></span></label>
                </div>
                <!-- 취소선 토글 버튼 -->
                <button id="btn-strikethrough" class="btn secondary">✓ 완료 (~취소선)</button>
            </div>

            <button id="btn-save" class="btn primary full-width" style="margin-top:10px;">저장 (구글 동기화)</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                  .then(reg => console.log('SW 설치 성공! (이제 앱 설치 조건 충족됨)'))
                  .catch(err => console.log('SW 설치 실패:', err));
            });
        }
    </script>
    <script src="app.js"></script>
    <div id="debug-log" style="display:none; position:fixed; bottom:0; left:0; width:100%; height:25%; background:rgba(0,0,0,0.85); color:#00FF00; font-family:monospace; font-size:11px; overflow-y:auto; z-index:9999; padding:5px; pointer-events:none;">[ System Logger Ready ]</div>
</body>
</html>
